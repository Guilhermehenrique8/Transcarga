<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="/TranscargaLogo.png" type="image/png">
        <link rel="stylesheet" href="cadastro.css">
        <meta charset="UTF-8">
        <title>Cadastrar Frete</title>
    </head>

    <body>

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="Fretes.html">Fretes</a>
            <a href="Relatorios.html">Relatórios</a>
        </nav>

        <main>

            <!-- Lado esquerdo: Logo grande -->
            <div class="lado-logo">
                <img src="/TranscargaLogo.png" class="logo-grande" alt="Transcarga">
                <p class="final-footer">© 2026 Transcarga — Transporte e segurança</p>
            </div>

            <!-- Lado direito: Formulário -->
            <div class="lado-form">

                <div class="status-badge">
                    <span class="dot"></span> Sistema ativo
                </div>

                <div class="card-header">
                    <h1>Cadastrar Frete</h1>
                    <h2>Preencha os dados da nova carga para registro no sistema</h2>
                </div>

                <form action="FreteServlet" method="post" accept-charset="UTF-8">
                    <div class="field">
                        <label>Destino:</label>
                        <input type="text" name="destino" placeholder="Ex: Mossoró, RN" required>
                    </div>

                    <div class="field">
                        <label>Peso (kg):</label>
                        <input type="number" name="peso" placeholder="Ex: 150" required>
                    </div>

                    <div class="field">
                        <label>Transportadora:</label>
                        <input type="text" name="transportadora" placeholder="Ex: Rápido Ltda" required>
                    </div>

                    <div class="card-footer">
                        <a href="index.html" class="btn-home">← Home</a>
                        <button type="submit" class="btn-submit">Cadastrar Frete</button>
                    </div>
                </form>

                

            </div>

                

        </main>

    </body>
</html>
