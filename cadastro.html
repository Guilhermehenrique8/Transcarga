<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="/TranscargaLogo.png" type="image/png">
        <link rel="stylesheet" href="cadastro.css">
        <meta charset="UTF-8">
        <title>Cadastrar Frete</title>
    </head>

    <body>
        <header class="header">
            <a href="#" class="logo">
                <img src="/TranscargaLogo.png" class="logo-img" alt="Transcarga">
            </a>

            <nav class="nav-links">
                <a href="#">Home</a>
                <a href="#">Fretes</a>
                <a href="#">Relatórios</a>
            </nav>

            <div class="status-badge">
                <span class="dot"></span> Sistema ativo
            </div>
        </header>

        <main>
            <div class="container">
               
                <div class="card-header">
                    <img src="CadastroLogo.png" class="icone-cadastro" alt="icone-cadastro">
                    <h1>Cadastrar Frete</h1>
                    <h2>Preencha os dados da nova carga para registro no sistema</h2>
                </div>
               
                <form action="FreteServlet" method="post" accept-charset="UTF-8">
                    <div class="field">
                        <label>Destino:</label>
                        <input type="text" name="destino" placeholder="Ex: Mossoró, RN" required>
                    </div>

                    <div class="field">
                        <label>Peso (kg):</label>
                        <input type="number" name="peso" placeholder="Ex: 150" required>
                    </div>

                    <div class="field">  
                        <label>Transportadora:</label>
                        <input type="text" name="transportadora" placeholder="Ex: Rápido Ltda" required>
                    </div>
                </form>

                <footer class="card-footer">
                    <a href="index.html" class="btn-home">← Home</a>
                    <button type="submit" class="btn-submit">Cadastrar Frete</button>
                </footer>

            </div>
        </main>

        <footer class="final-footer">© 2025 Transcarga — Transporte e segurança</footer>
        
    </body>
</html>
